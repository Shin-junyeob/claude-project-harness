name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f pyproject.toml ]; then
            pip install -e ".[dev]"
          else
            pip install ruff pytest
            if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          fi

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: |
          set +e
          pytest
          code=$?
          set -e
          # exit code 5 = 수집된 테스트 없음 → 통과로 처리(초기 빈 프로젝트)
          if [ "$code" = "5" ]; then
            echo "no tests collected — skipping"
            exit 0
          fi
          exit $code
